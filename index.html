<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakś strona</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .contact {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .contact-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }
        
        .contact-btn:hover {
            background: #764ba2;
        }
        a.contact-btn {
            text-decoration: none;
        }
        .mini-apps-list {
            list-style: disc;
            margin-top: 10px;
            width: fit-content;
            margin: 0 auto;
        }
        .mini-apps-list li {
            margin: 5px 0;
        }
        .mini-apps-list a {
            cursor: pointer;
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .mini-apps-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        
        <div class="description">
            Strona pewnego programisty, niechcę się chwalić, kim jestem. 
            Pewnie wiecznie w budowie, ale może kiedyś coś tu będzie.
        </div>
        
        <div class="contact">
            <a href="mailto:3t4yo8zye@mozmail.com" class="contact-btn">Email</a>
        </div>
        <br/>
        <div class="mini-apps">
            <p>
                Mini Aplikacje
                <br/>
                Sam z nich korzystam, więc może i Tobie się przydadzą, lub nie.
            </p>
            <ul class="mini-apps-list">
                <li><a href="mini_apps/html_cleaner/index.html">HTML Cleaner</a></li>
                <li><a href="mini_apps/image_split_to_print/index.html">Podziel zdjęcie na kafelki</a></li>
                <li><a href="mini_apps/url_list/index.html">Listy w URL</a></li>
            </ul>
        </div>  
    </div>
</body>
</html>
